<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:include="include/admin/adminHeader::html('编辑数据')"></head>
<body>
<div th:replace="include/admin/adminNavigator::html"></div>
<script>
    $(function () {
        var data4Vue = {
            uri: 'products',
            listURL: 'admin_product_list',
            bean: {id: 0, name: '', var1: '', var2: '', var3: ''},
        };

        //ViewModel
        var vue = new Vue({
            el: '#workingArea',
            data: data4Vue,
            mounted: function () { //mounted　表示这个 Vue 对象加载成功了
                this.get();
            },
            methods: {
                get: function () {
                    var id = getUrlParms("id");
                    var url = this.uri + "/" + id;
                    axios.get(url).then(function (response) {
                        vue.bean = response.data;
                    })
                },
                update: function () {
                    // if(!checkEmpty(this.bean.name, "数据名称"))
                    //     return;
                    var url = this.uri + "/" + this.bean.id;
                    var formData = new FormData();
                    formData.set("name", this.bean.name);
                    formData.set("var1", this.bean.var1);
                    formData.set("var2", this.bean.var2);
                    formData.set("var3", this.bean.var3);
                    axios.post(url,formData).then(function (response) {
                        location.href=vue.listURL;
                    });
                },
            }
        });
    });
</script>

<div id="workingArea">

    <ol class="breadcrumb">
        <li><a href="admin_product_list">所有数据</a></li>
        <li class="active">编辑数据</li>
    </ol>

    <div class="panel panel-warning editDiv">
        <div class="panel-heading">编辑分类</div>
        <div class="panel-body">
            <table class="editTable">
                <tr>
                    <td>数据名称</td>
                    <td><input @keyup.enter="update" v-model.trim="bean.name" type="text" class="form-control"></td>
                </tr>
                <tr>
                    <td>变量1:</td>
                    <td><input @keyup.enter="update" v-model.trim="bean.var1" type="text" class="form-control"></td>
                </tr>
                <tr>
                    <td>变量2:</td>
                    <td><input @keyup.enter="update" v-model.trim="bean.var2" type="text" class="form-control"></td>
                </tr>
                <tr>
                    <td>变量3:</td>
                    <td><input @keyup.enter="update" v-model.trim="bean.var3" type="text" class="form-control"></td>
                </tr>
                <tr class="submitTR">
                    <td colspan="2" align="center">
                        <input type="hidden" name="id" v-model.trim="bean.id">
                        <a href="#nowhere" class="btn btn-success" @click="update">提 交</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>

<div th:replace="include/admin/adminFooter::html"></div>
</body>
</html>
